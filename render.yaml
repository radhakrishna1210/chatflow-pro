# Render Blueprint — ChatFlow Pro (SEPARATE frontend + backend deployment)
#
# Two services:
#   1. chatflow-pro-api      — Express backend (web service, Node)
#   2. chatflow-pro-web      — Vite frontend (static site)
# Plus a Redis (Key Value) instance for BullMQ queues.
#
# The frontend calls the backend cross-origin. The backend already sends
# `Access-Control-Allow-Origin: *`, so no CORS config is needed. The frontend
# must be built with VITE_API_URL pointing at the backend's public URL
# (baked in at build time — see the env var below).
#
# Postgres stays on Supabase (set DATABASE_URL below). Secrets marked
# `sync: false` are filled in the Render dashboard. See DEPLOY.md.

services:
  # ----------------------------------------------------------------------
  # Backend API (Express)
  # ----------------------------------------------------------------------
  - type: web
    name: chatflow-pro-api
    runtime: node
    plan: free
    region: singapore
    branch: feature/embedded-signup
    rootDir: backend
    # postinstall runs `prisma generate`; --include=dev pulls in the prisma CLI
    # (it's a devDependency) which NODE_ENV=production would otherwise skip.
    buildCommand: npm install --include=dev
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: JSON_BODY_LIMIT
        value: 2mb

      # --- Redis (BullMQ) — provisioned by this blueprint ---
      - key: REDIS_URL
        fromService:
          type: redis
          name: chatflow-redis
          property: connectionString

      # --- Database (Supabase session pooler, port 5432) ---
      - key: DATABASE_URL
        sync: false

      # --- URLs ---
      # CLIENT_URL = the frontend static-site URL (used for OAuth redirects, etc.)
      - key: CLIENT_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: CHATFLOW_PRO_URL
        sync: false
      # Must match the URI registered in Google Cloud Console exactly:
      #   https://chatflow-pro-api.onrender.com/api/v1/auth/google/callback
      - key: GOOGLE_CALLBACK_URL
        sync: false

      # --- Auth / crypto secrets ---
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      # Must be exactly 32 characters (AES-256 key) — set manually.
      - key: ENCRYPTION_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false

      # --- Meta / WhatsApp Cloud API ---
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_BUSINESS_ID
        sync: false
      - key: META_WABA_ID
        sync: false
      - key: META_SYSTEM_USER_ID
        sync: false
      - key: META_SYSTEM_USER_TOKEN
        sync: false
      - key: META_DISPLAY_NAME
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_API_VERSION
        value: v21.0
      - key: META_TWO_STEP_PIN
        sync: false
      - key: META_ES_CONFIG_ID
        sync: false

      # --- Google OAuth ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # --- Twilio (optional) ---
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false

      # --- Campaign worker tuning ---
      - key: CAMPAIGN_BATCH_SIZE
        value: "50"
      - key: CAMPAIGN_WORKER_CONCURRENCY
        value: "2"

      # --- SMTP email notifications ---
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM_NAME
        value: ChatFlow Pro
      - key: EMAIL_FROM
        sync: false

  # ----------------------------------------------------------------------
  # Frontend (Vite static site)
  # ----------------------------------------------------------------------
  - type: web
    name: chatflow-pro-web
    runtime: static
    branch: feature/embedded-signup
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      # Baked into the bundle at build time. Must be the backend's public URL,
      # e.g. https://chatflow-pro-api.onrender.com (no trailing slash).
      # NOTE: changing this requires a *rebuild* of the frontend, not just a restart.
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback so client-side routes resolve to index.html.
      - type: rewrite
        source: /*
        destination: /index.html

# Redis instance for BullMQ queues (campaign, emails, provisioning).
# Render calls this "Key Value"; the blueprint type is still `redis`.
redis:
  - name: chatflow-redis
    plan: free
    region: singapore
    maxmemoryPolicy: noeviction   # required for BullMQ — never evict job data
    ipAllowList: []               # internal-only access from the web service
